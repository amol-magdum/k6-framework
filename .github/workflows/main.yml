name: execution with dashboard

on:
  workflow_dispatch:
    inputs:
      env_type:
        description: 'Select Environment'
        required: true
        default: 'perf'
        type: choice
        options: [dev, qa, perf]
      test_type:
        description: 'Select Test Type'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, load, stress, vu1d5m]

jobs:
  k6-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Live Dashboard Tunnel
        shell: bash
        run: |
          # Start tunnel in background
          cloudflared tunnel --url http://localhost:5665 > tunnel.log 2>&1 &
          
          # Wait for Cloudflare to generate the URL
          sleep 10
          
          # Extract the URL and print it to the logs
          echo "------------------------------------------------------------"
          echo "🚀 LIVE DASHBOARD URL:"
          grep -o 'https://.*\.trycloudflare\.com' tunnel.log || echo "URL not ready yet."
          echo "------------------------------------------------------------"
          
          # Crucial: Write the URL to the GitHub Step Summary so it's easy to find
          echo "### 🚀 Live k6 Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "Click here to view: $(grep -o 'https://.*\.trycloudflare\.com' tunnel.log)" >> $GITHUB_STEP_SUMMARY

      - name: Run k6 script
        uses: grafana/k6-action@v0.3.1
        with:
          filename: ./test_scripts/End_to_End_All_Methods.js
          flags: --env env=${{ inputs.env_type }} --env TEST_TYPE=${{ inputs.test_type }}
        env:
          K6_WEB_DASHBOARD: true
          K6_WEB_DASHBOARD_HOST: 0.0.0.0
          K6_WEB_DASHBOARD_PORT: 5665
          K6_WEB_DASHBOARD_PERIOD: 1s
          # Save export to current dir for easy artifact upload
          K6_WEB_DASHBOARD_EXPORT: End_to_End_All_Methods.html

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: End_to_End_All_Methods.html
